name: E2E Tests

on:
  pull_request:
    branches:
      - main

jobs:
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    # NOTE: Full E2E requires a live Firebase project or Firebase emulator setup.
    # Until Firebase emulator is configured in CI, this job is allowed to fail
    # without blocking the PR merge. Remove continue-on-error once emulators are set up.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Copy environment template
        run: cp src/environments/environment.template.ts src/environments/environment.ts
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Start dev server
        run: npx ng serve &
      - name: Wait for dev server
        run: npx wait-on http://localhost:4200 --timeout 60000
      - name: Run E2E tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
